<!DOCTYPE html>
<html lang="en" class="dark theme-black font-system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUD - Lifecycle OS</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      safelist: [
        'text-hud-cyan', 'text-hud-primary', 'bg-hud-panel', 'bg-hud-bg', 'border-hud-border', 'text-hud-text', 'text-hud-textMuted',
        'bg-hud-cyanDim', 'bg-hud-alertDim', 'text-hud-alert',
        'theme-cyan', 'theme-pink', 'theme-blue', 'theme-purple', 'theme-green', 'theme-red', 'theme-white', 'theme-black',
        'font-inter', 'font-jetbrains-mono', 'font-fira-code', 'font-space-grotesk', 'font-orbitron', 'font-system',
        'dark'
      ],
      theme: {
        extend: {
          colors: {
            hud: {
              bg: 'var(--hud-bg)',
              panel: 'var(--hud-panel)',
              border: 'var(--hud-border)',
              primary: 'var(--hud-primary)',
              primaryDim: 'var(--hud-primary-dim)',
              cyan: 'var(--hud-primary)', /* Alias for backward compatibility */
              cyanDim: 'var(--hud-primary-dim)',
              alert: 'var(--hud-alert)',
              alertDim: 'var(--hud-alert-dim)',
              text: 'var(--hud-text)',
              textMuted: 'var(--hud-text-muted)'
            }
          },
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            'jetbrains-mono': ['"JetBrains Mono"', 'monospace'],
            'fira-code': ['"Fira Code"', 'monospace'],
            'space-grotesk': ['"Space Grotesk"', 'sans-serif'],
            orbitron: ['Orbitron', 'sans-serif'],
            system: ['system-ui', 'sans-serif'],
          },
          fontSize: {
            xs: ['calc(0.75rem * var(--font-scale))', { lineHeight: '1rem' }],
            sm: ['calc(0.875rem * var(--font-scale))', { lineHeight: '1.25rem' }],
            base: ['calc(1rem * var(--font-scale))', { lineHeight: '1.5rem' }],
            lg: ['calc(1.125rem * var(--font-scale))', { lineHeight: '1.75rem' }],
            xl: ['calc(1.25rem * var(--font-scale))', { lineHeight: '1.75rem' }],
            '2xl': ['calc(1.5rem * var(--font-scale))', { lineHeight: '2rem' }],
            '3xl': ['calc(1.875rem * var(--font-scale))', { lineHeight: '2.25rem' }],
            '4xl': ['calc(2.25rem * var(--font-scale))', { lineHeight: '2.5rem' }],
            '5xl': ['calc(3rem * var(--font-scale))', { lineHeight: '1' }],
            '6xl': ['calc(3.75rem * var(--font-scale))', { lineHeight: '1' }],
            '7xl': ['calc(4.5rem * var(--font-scale))', { lineHeight: '1' }],
            '8xl': ['calc(6rem * var(--font-scale))', { lineHeight: '1' }],
            '9xl': ['calc(8rem * var(--font-scale))', { lineHeight: '1' }],
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --font-scale: 1;
      --hud-bg: #ffffff;
      --hud-panel: #f4f4f5;
      --hud-border: #e4e4e7;
      --hud-text: #09090b;
      --hud-text-muted: #71717a;
      --hud-alert: #52525b;
      --hud-alert-dim: rgba(82, 82, 91, 0.15);
      --hud-primary: #18181b;
      --hud-primary-dim: rgba(24, 24, 27, 0.15);
      --hud-primary-rgb: 24,24,27;
    }
    html.dark {
      --hud-bg: #000000;
      --hud-panel: rgba(18, 18, 18, 0.75);
      --hud-border: #27272a;
      --hud-text: #ffffff;
      --hud-text-muted: #a1a1aa;
      --hud-alert: #a1a1aa;
      --hud-alert-dim: rgba(161, 161, 170, 0.15);
      --hud-primary: #ffffff;
      --hud-primary-dim: rgba(255, 255, 255, 0.15);
      --hud-primary-rgb: 255,255,255;
    }

    /* Color Palettes (Light Mode) */
    .theme-cyan { --hud-primary: #09090b; --hud-primary-dim: rgba(9, 9, 11, 0.15); --hud-primary-rgb: 9,9,11; }
    .theme-pink { --hud-primary: #09090b; --hud-primary-dim: rgba(9, 9, 11, 0.15); --hud-primary-rgb: 9,9,11; }
    .theme-blue { --hud-primary: #09090b; --hud-primary-dim: rgba(9, 9, 11, 0.15); --hud-primary-rgb: 9,9,11; }
    .theme-purple { --hud-primary: #09090b; --hud-primary-dim: rgba(9, 9, 11, 0.15); --hud-primary-rgb: 9,9,11; }
    .theme-green { --hud-primary: #09090b; --hud-primary-dim: rgba(9, 9, 11, 0.15); --hud-primary-rgb: 9,9,11; }
    .theme-red { --hud-primary: #09090b; --hud-primary-dim: rgba(9, 9, 11, 0.15); --hud-primary-rgb: 9,9,11; }
    .theme-white { --hud-primary: #27272a; --hud-primary-dim: rgba(39, 39, 42, 0.15); --hud-primary-rgb: 39,39,42; }
    .theme-black { --hud-primary: #000000; --hud-primary-dim: rgba(0, 0, 0, 0.15); --hud-primary-rgb: 0,0,0; }

    html.dark.theme-cyan { --hud-primary: #ffffff; --hud-primary-dim: rgba(255, 255, 255, 0.15); --hud-primary-rgb: 255,255,255; }
    html.dark.theme-pink { --hud-primary: #ffffff; --hud-primary-dim: rgba(255, 255, 255, 0.15); --hud-primary-rgb: 255,255,255; }
    html.dark.theme-blue { --hud-primary: #ffffff; --hud-primary-dim: rgba(255, 255, 255, 0.15); --hud-primary-rgb: 255,255,255; }
    html.dark.theme-purple { --hud-primary: #ffffff; --hud-primary-dim: rgba(255, 255, 255, 0.15); --hud-primary-rgb: 255,255,255; }
    html.dark.theme-green { --hud-primary: #ffffff; --hud-primary-dim: rgba(255, 255, 255, 0.15); --hud-primary-rgb: 255,255,255; }
    html.dark.theme-red { --hud-primary: #ffffff; --hud-primary-dim: rgba(255, 255, 255, 0.15); --hud-primary-rgb: 255,255,255; }
    html.dark.theme-white { --hud-primary: #ffffff; --hud-primary-dim: rgba(255, 255, 255, 0.15); --hud-primary-rgb: 255,255,255; }
    html.dark.theme-black { --hud-primary: #a1a1aa; --hud-primary-dim: rgba(161, 161, 170, 0.15); --hud-primary-rgb: 161,161,170; }

    body {
      background-color: var(--hud-bg);
      color: var(--hud-text);
      overflow: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    
    /* Custom Scrollbar for HUD feel */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--hud-border);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--hud-primary);
    }
  </style>
  </head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
